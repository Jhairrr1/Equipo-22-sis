<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Pedidos - RestaurantePro</title>
<link rel="stylesheet" href="css/styles.css"/>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <header class="header" id="header"></header>
    <div class="content">
      <div class="page-header">
        <div><h2>Pedidos</h2><div class="desc">Crea y administra los pedidos del restaurante.</div></div>
        <button class="btn btn-primary" onclick="openNuevoPedido()">+ Nuevo pedido</button>
      </div>
      <div class="card"><div class="table-wrap" id="pedidosTable"></div></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="pedidoModal">
  <div class="modal lg">
    <div class="modal-h"><h3>Nuevo pedido</h3><button class="close-x" onclick="closeModal('pedidoModal')">✕</button></div>
    <div class="modal-b">
      <div class="form-group"><label>Mesa</label><select id="selMesa" class="form-control"></select></div>
      <div class="pedido-layout">
        <div>
          <h4 style="font-size:13px; text-transform:uppercase; color:var(--text-2); margin-bottom:10px;">Platos disponibles</h4>
          <div id="platosSel" class="cart-list" style="max-height:380px;"></div>
        </div>
        <div style="background:var(--surface-2); padding:14px; border-radius:8px;">
          <h4 style="font-size:13px; text-transform:uppercase; color:var(--text-2); margin-bottom:10px;">🛒 Pedido actual</h4>
          <div id="cartList" class="cart-list"></div>
          <div id="cartTotals" class="totals"></div>
        </div>
      </div>
    </div>
    <div class="modal-f">
      <button class="btn btn-outline" onclick="closeModal('pedidoModal')">Cancelar</button>
      <button class="btn btn-primary" onclick="guardarPedido()">✓ Confirmar pedido</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="detPedidoModal">
  <div class="modal">
    <div class="modal-h"><h3>Detalle de pedido</h3><button class="close-x" onclick="closeModal('detPedidoModal')">✕</button></div>
    <div class="modal-b" id="detModalBody"></div>
    <div class="modal-f"><button class="btn btn-primary" onclick="closeModal('detPedidoModal')">Cerrar</button></div>
  </div>
</div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script src="js/pedidos.js"></script>
<script>
  const s = requireAuth(['Administrador','Mozo']);
  if (s) { renderShell('pedidos','Pedidos','Operaciones / Pedidos'); renderPedidos(); }
</script>
</body>
</html>
