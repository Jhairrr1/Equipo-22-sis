<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Mesas - RestaurantePro</title>
<link rel="stylesheet" href="css/styles.css"/>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <header class="header" id="header"></header>
    <div class="content">
      <div class="page-header">
        <div><h2>Gestión de mesas</h2><div class="desc">Administra el estado y disponibilidad de las mesas.</div></div>
        <button class="btn btn-primary" onclick="openMesaModal()">+ Nueva mesa</button>
      </div>
      <div class="toolbar">
        <select id="filtroEstado" onchange="renderMesas()">
          <option value="">Todos los estados</option>
          <option>Disponible</option><option>Ocupada</option><option>Reservada</option><option>En limpieza</option>
        </select>
        <div style="margin-left:auto; display:flex; gap:14px; font-size:12px; color:var(--text-2)">
          <span><span class="badge success">Disponible</span></span>
          <span><span class="badge danger">Ocupada</span></span>
          <span><span class="badge warning">Reservada</span></span>
          <span><span class="badge info">En limpieza</span></span>
        </div>
      </div>
      <div class="card"><div id="mesasGrid" class="mesa-grid"></div></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="mesaModal">
  <div class="modal">
    <div class="modal-h"><h3 id="mesaModalTitle">Nueva mesa</h3><button class="close-x" onclick="closeModal('mesaModal')">✕</button></div>
    <form onsubmit="return saveMesa(event)">
      <div class="modal-b">
        <div class="form-group"><label>Número de mesa</label><input id="mNumero" type="number" min="1" class="form-control" required/></div>
        <div class="form-group"><label>Capacidad (personas)</label><input id="mCapacidad" type="number" min="1" class="form-control" required/></div>
        <div class="form-group"><label>Estado</label>
          <select id="mEstado" class="form-control">
            <option>Disponible</option><option>Ocupada</option><option>Reservada</option><option>En limpieza</option>
          </select>
        </div>
      </div>
      <div class="modal-f">
        <button type="button" class="btn btn-outline" onclick="closeModal('mesaModal')">Cancelar</button>
        <button type="submit" class="btn btn-primary">Guardar mesa</button>
      </div>
    </form>
  </div>
</div>
<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script src="js/mesas.js"></script>
<script>
  const s = requireAuth(['Administrador','Mozo']);
  if (s) { renderShell('mesas','Mesas','Operaciones / Mesas'); renderMesas(); }
</script>
</body>
</html>
