<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Módulo 2 - Registro de Pedidos</title>
  <link rel="stylesheet" href="modulo2-styles.css">
</head>
<body>

<div class="container">
  <h2>Registro de Pedidos</h2>

  <label>Código Pedido</label>
  <input type="text" id="codigo" readonly>

  <label>Mozo</label>
  <input type="text" id="mozo">

  <label>Mesa</label>
  <input type="number" id="mesa">

  <label>Prioridad</label>
  <select id="prioridad">
    <option value="Normal">Normal</option>
    <option value="Alta">Alta</option>
    <option value="Urgente">Urgente</option>
  </select>

  <label>Justificación (solo urgente)</label>
  <textarea id="justificacion"></textarea>

  <hr>

  <h3>Platos activos</h3>
  <div id="platos"></div>

  <h3>Pedido</h3>
  <div id="detalle"></div>
  <h4>Total: S/ <span id="total">0</span></h4>

  <button onclick="guardarPedido()">Guardar Pedido</button>

  <h3>Pedidos</h3>
  <div id="lista"></div>
</div>

<script src="modulo2-script.js"></script>
</body>
</html>
