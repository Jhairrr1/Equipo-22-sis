<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Menu - RestaurantePro</title><link rel="stylesheet" href="../../css/styles.css"></head><body><div class="app"><aside class="sidebar" id="sidebar"></aside><div class="main"><header class="header" id="header"></header><div class="content"><div class="page-header"><div><h2>Carta del menú</h2><div class="desc">Registra platos disponibles para los pedidos.</div></div><button class="btn btn-primary" onclick="openPlatoModal()">+ Nuevo plato</button></div><div class="toolbar"><input id="buscarPlato" placeholder="Buscar plato..." oninput="renderMenu()" style="max-width:420px"><select id="filtroCat" onchange="renderMenu()"><option value="">Todas las categorías</option><option>Entradas</option><option>Fondos</option><option>Bebidas</option><option>Postres</option></select></div><div id="menuGrid" class="menu-grid"></div><div class="modal-overlay" id="platoModal"><div class="modal"><div class="modal-h"><h3 id="platoModalTitle">Nuevo plato</h3><button class="close-x" onclick="closeModal('platoModal')">✕</button></div><form onsubmit="return savePlato(event)"><div class="modal-b"><div class="form-group"><label>Nombre</label><input id="pNombre" class="form-control" required></div><div class="form-group"><label>Descripción</label><textarea id="pDesc" class="form-control" rows="2"></textarea></div><div class="grid grid-2"><div class="form-group"><label>Categoría</label><select id="pCat" class="form-control"><option>Entradas</option><option>Fondos</option><option>Bebidas</option><option>Postres</option></select></div><div class="form-group"><label>Estado</label><select id="pEstado" class="form-control"><option>Activo</option><option>Inactivo</option></select></div><div class="form-group"><label>Precio</label><input id="pPrecio" type="number" min="0.1" step="0.1" class="form-control" required></div><div class="form-group"><label>Stock</label><input id="pStock" type="number" min="0" class="form-control" required></div></div><div class="form-group"><label>Ícono</label><input id="pIcono" class="form-control" placeholder="🍽️"></div></div><div class="modal-f"><button type="button" class="btn btn-outline" onclick="closeModal('platoModal')">Cancelar</button><button class="btn btn-primary">Guardar plato</button></div></form></div></div></div></div></div><script src="../../js/data.js"></script><script src="../../js/app.js"></script><script src="../../js/menu.js"></script></body></html>
