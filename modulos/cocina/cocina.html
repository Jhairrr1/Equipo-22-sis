<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cocina - RestaurantePro</title>
<link rel="stylesheet" href="../../css/styles.css">
<link rel="stylesheet" href="cocina.css">
</head>
<body>
<div class="app">
<aside class="sidebar" id="sidebar">
</aside>
<div class="main">
<header class="header" id="header">
</header>
<div class="content">
<div class="page-header">
<div>
<h2>Tablero de cocina</h2>
<div class="desc">Gestiona preparación y entrega de pedidos.</div>
</div>
<button class="btn btn-outline" onclick="renderCocina()">Actualizar</button>
</div>
<div class="kanban">
<div class="kanban-col">
<h3>⏱ Pendientes <span class="badge warning" id="cntPend">0</span>
</h3>
<div id="colPendiente">
</div>
</div>
<div class="kanban-col">
<h3>👨‍🍳 En preparación <span class="badge info" id="cntPrep">0</span>
</h3>
<div id="colPrep">
</div>
</div>
<div class="kanban-col">
<h3>✅ Listos <span class="badge success" id="cntListo">0</span>
</h3>
<div id="colListo">
</div>
</div>
</div>
</div>
</div>
</div>
<script src="../../js/data.js">
</script>
<script src="../../js/app.js">
</script>
<script src="cocina.js">
</script>
</body>
</html>
