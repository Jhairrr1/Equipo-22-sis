<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Mesas - RestaurantePro</title><link rel="stylesheet" href="css/styles.css"></head><body><div class="app"><aside class="sidebar" id="sidebar"></aside><div class="main"><header class="header" id="header"></header><div class="content"><div class="page-header"><div><h2>Gestión de mesas</h2><div class="desc">Registra y controla las mesas del restaurante.</div></div><button class="btn btn-primary" onclick="openMesaModal()">+ Nueva mesa</button></div><div class="toolbar"><select id="filtroEstado" onchange="renderMesas()"><option value="">Todos los estados</option><option>Disponible</option><option>Ocupada</option><option>Reservada</option><option>En limpieza</option></select></div><div class="card"><div id="mesasGrid" class="mesa-grid"></div></div></div></div></div><div class="modal-overlay" id="mesaModal"><div class="modal"><div class="modal-h"><h3 id="mesaModalTitle">Nueva mesa</h3><button class="close-x" onclick="closeModal('mesaModal')">✕</button></div><form onsubmit="return saveMesa(event)"><div class="modal-b"><div class="form-group"><label>Número de mesa</label><input id="mNumero" class="form-control" type="number" min="1" required></div><div class="form-group"><label>Capacidad</label><input id="mCapacidad" class="form-control" type="number" min="1" required></div><div class="form-group"><label>Estado</label><select id="mEstado" class="form-control"><option>Disponible</option><option>Ocupada</option><option>Reservada</option><option>En limpieza</option></select></div></div><div class="modal-f"><button type="button" class="btn btn-outline" onclick="closeModal('mesaModal')">Cancelar</button><button class="btn btn-primary">Guardar mesa</button></div></form></div></div><script src="js/data.js"></script><script src="js/app.js"></script><script src="js/mesas.js"></script><script>renderShell('mesas','Mesas','Operaciones / Mesas');renderMesas()</script></body></html>
